name: SwiftLint

on:
  pull_request:
    paths: [wonni/wonni/**/*.swift]

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --config wonni/.swiftlint.yml wonni/wonni/
