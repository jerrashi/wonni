name: Test & Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: SwiftLint
        run: |
          cd wonni
          if which swiftlint > /dev/null; then
            swiftlint
          else
            echo "SwiftLint not installed, skipping"
          fi

  unit-tests:
    name: Unit Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run unit tests
        run: |
          cd wonni
          xcodebuild test \
            -scheme wonni \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            -enableCodeCoverage YES \
            2>&1 | tee test-output.log

      - name: Check test results
        if: failure()
        run: |
          echo "❌ Unit tests failed"
          tail -50 wonni/test-output.log
          exit 1

  ui-tests:
    name: UI Tests (Selling Flow)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run selling flow UI tests
        run: |
          cd wonni
          xcodebuild test \
            -scheme wonniUITests \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            -testPlan SellingFlow \
            2>&1 | tee ui-test-output.log

      - name: Check UI test results
        if: failure()
        run: |
          echo "❌ UI tests failed - Selling flow is broken!"
          tail -100 wonni/ui-test-output.log
          exit 1

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: ui-test-logs
          path: wonni/ui-test-output.log

  build:
    name: Build Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build app
        run: |
          cd wonni
          xcodebuild build \
            -scheme wonni \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug

      - name: Build UI tests
        run: |
          cd wonni
          xcodebuild build-for-testing \
            -scheme wonniUITests \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug

  test-results:
    name: Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, ui-tests, build]
    if: always()
    steps:
      - name: ✅ All checks passed
        if: success()
        run: echo "All tests and lint checks passed!"

      - name: ❌ Some checks failed
        if: failure()
        run: |
          echo "⚠️  Build or tests failed. Review the logs above."
          exit 1
