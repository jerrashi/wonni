disabled_rules:
  - trailing_whitespace      # Xcode handles this
  - line_length              # SwiftUI chains get long
  - file_length              # Views grow large
  - type_body_length
  - function_body_length
  - cyclomatic_complexity

opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - overridden_super_call

excluded:
  - wonni.xcodeproj
  - wonni/Preview Content

force_cast: warning
force_try: warning
